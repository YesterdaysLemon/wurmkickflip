name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: Static and fast checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.8
          enable-cache: true
          cache-dependency-glob: training/uv.lock
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - run: uv sync --project training --frozen --group dev
      - run: npm run check:fast

  integration:
    name: Deterministic integration checks
    needs: fast
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.8
          enable-cache: true
          cache-dependency-glob: training/uv.lock
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - run: uv sync --project training --frozen
      - run: npm run check:integration

  browser:
    name: Production browser smoke checks
    needs: fast
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run check:browser
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-browser-smoke-artifacts
          path: |
            playwright-report
            test-results/playwright
          if-no-files-found: ignore
          retention-days: 7
